version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_build:/app/dist
    environment:
      - VITE_API_URL=https://your-domain.com/api
    command: npm run build

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    expose:
      - "8000"
    volumes:
      - ./backend/config:/app/config:ro  # Firebase credentials
    environment:
      - OLLAMA_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=production
      # Firebase credentials (выберите один вариант):
      # Вариант 1: из файла (рекомендуется для production)
      - FIREBASE_CREDENTIALS_PATH=/app/config/firebase-credentials.json
      # Вариант 2: из переменной окружения (раскомментируйте если используете)
      # - FIREBASE_CREDENTIALS_JSON=${FIREBASE_CREDENTIALS_JSON}
    depends_on:
      - redis
      - ollama
    restart: always

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always

  # PostgreSQL больше не требуется - используется Firebase вместо него
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_USER=user
  #     - POSTGRES_PASSWORD=${DB_PASSWORD}
  #     - POSTGRES_DB=studentdb
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always

volumes:
  ollama_data:
  redis_data:
  frontend_build:
  # postgres_data:  # Больше не требуется
